<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1c2b"/><stop offset="100%" stop-color="#070f18"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16384a"/><stop offset="100%" stop-color="#0b2030"/>
    </linearGradient>
    <linearGradient id="cardM" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#21303d"/><stop offset="100%" stop-color="#121f2a"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16322a"/><stop offset="100%" stop-color="#0e231d"/>
    </linearGradient>
    <radialGradient id="amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5a623" stop-opacity="0.55"/><stop offset="100%" stop-color="#f5a623" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#ffffff" opacity="0.035"/>
    </pattern>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="ar" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5fe0d9"/>
    </marker>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#grid)"/>
  <text x="60" y="62" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="20" fill="#34c5c9">// the correction layer</text>
  <text x="58" y="108" font-size="38" font-weight="700" fill="#eef4f7">Fix the data on its way in</text>
  <text x="70" y="188" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="15" fill="#6b8190">INCOMING &#183; CMDB</text>
  <text x="828" y="188" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="15" fill="#6b8190">SOURCE OF TRUTH</text>
  <g fill="none" stroke-width="3" opacity="0.55" filter="url(#glow)">
    <path d="M285,250 C390,250 410,355 498,360" stroke="#ff6b6b"/>
    <path d="M268,360 C390,360 410,372 498,378" stroke="#f5a623"/>
    <path d="M292,470 C395,470 410,398 498,398" stroke="#ff6b6b"/>
  </g>
  <g fill="none" stroke-width="3" opacity="0.7" filter="url(#glow)">
    <path d="M712,360 C760,360 772,330 812,330" stroke="#3ddc84" marker-end="url(#ar)"/>
    <path d="M712,380 C760,380 772,390 812,390" stroke="#3ddc84" marker-end="url(#ar)"/>
    <path d="M712,400 C760,400 772,450 812,450" stroke="#3ddc84" marker-end="url(#ar)"/>
  </g>
  <g transform="translate(70,228) rotate(-6)" filter="url(#shadow)">
    <rect width="210" height="50" rx="11" fill="url(#cardM)" stroke="#ff6b6b" stroke-width="1.5" stroke-opacity="0.55"/>
    <circle cx="24" cy="25" r="6" fill="#ff6b6b" filter="url(#glow)"/>
    <text x="42" y="31" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="17" fill="#cdd8e0">40+ "Cisco" names</text>
  </g>
  <g transform="translate(56,338) rotate(4)" filter="url(#shadow)">
    <rect width="222" height="50" rx="11" fill="url(#cardM)" stroke="#f5a623" stroke-width="1.5" stroke-opacity="0.55"/>
    <circle cx="24" cy="25" r="6" fill="#f5a623" filter="url(#glow)"/>
    <text x="42" y="31" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="17" fill="#cdd8e0">region in wrong field</text>
  </g>
  <g transform="translate(78,448) rotate(-4)" filter="url(#shadow)">
    <rect width="206" height="50" rx="11" fill="url(#cardM)" stroke="#ff6b6b" stroke-width="1.5" stroke-opacity="0.55"/>
    <circle cx="24" cy="25" r="6" fill="#ff6b6b" filter="url(#glow)"/>
    <text x="42" y="31" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="17" fill="#cdd8e0">duplicates + stacks</text>
  </g>
  <circle cx="605" cy="445" r="70" fill="url(#amber)"/>
  <g filter="url(#shadow)">
    <rect x="500" y="270" width="210" height="210" rx="38" fill="url(#hub)" stroke="#34c5c9" stroke-width="2.5"/>
  </g>
  <text x="605" y="322" text-anchor="middle" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="23" font-weight="700" fill="#5fe0d9" filter="url(#glow)">THE SYNC</text>
  <line x1="540" y1="340" x2="670" y2="340" stroke="#34c5c9" stroke-width="1" opacity="0.4"/>
  <g font-size="20" fill="#eef4f7" text-anchor="middle">
    <text x="605" y="375"><tspan fill="#34c5c9">&#183; </tspan>normalize</text>
    <text x="605" y="405"><tspan fill="#34c5c9">&#183; </tspan>derive</text>
    <text x="605" y="435"><tspan fill="#34c5c9">&#183; </tspan>de-dupe</text>
    <text x="605" y="465"><tspan fill="#34c5c9">&#183; </tspan>validate</text>
  </g>
  <g transform="translate(812,305)" filter="url(#shadow)">
    <rect width="300" height="50" rx="11" fill="url(#cardC)" stroke="#3ddc84" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="22" y="31" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="17"><tspan fill="#3ddc84" font-weight="700">+ </tspan><tspan fill="#cdd8e0">one canonical Cisco</tspan></text>
  </g>
  <g transform="translate(812,365)" filter="url(#shadow)">
    <rect width="300" height="50" rx="11" fill="url(#cardC)" stroke="#3ddc84" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="22" y="31" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="17"><tspan fill="#3ddc84" font-weight="700">+ </tspan><tspan fill="#cdd8e0">region from country</tspan></text>
  </g>
  <g transform="translate(812,425)" filter="url(#shadow)">
    <rect width="300" height="50" rx="11" fill="url(#cardC)" stroke="#3ddc84" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="22" y="31" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="17"><tspan fill="#3ddc84" font-weight="700">+ </tspan><tspan fill="#cdd8e0">one record per device</tspan></text>
  </g>
  <text x="605" y="612" text-anchor="middle" font-family="'JetBrains Mono','DejaVu Sans Mono',monospace" font-size="19" fill="#8b9eac">&#8594; golden config &#183; compliance &#183; every decision downstream</text>
</svg>
