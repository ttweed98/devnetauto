<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#143246"/><stop offset="100%" stop-color="#0b1d2b"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softshadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <g filter="url(#softshadow)">
    <rect x="24" y="24" width="192" height="192" rx="44" fill="url(#tile)" stroke="#34c5c9" stroke-width="1.8" stroke-opacity="0.5"/>
  </g>
  <polyline points="89,76 141,120 89,164" fill="none" stroke="#5fe0d9" stroke-width="15" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <rect x="152" y="151" width="50" height="15" rx="7" fill="#5fe0d9" filter="url(#glow)"/>
</svg>
